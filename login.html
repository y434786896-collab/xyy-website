<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 小一二官网</title>
    <style>
        * { margin: 0; padding:0; box-sizing: border-box; }
        :root { --primary: #667eea; --secondary: #764ba2; --dark: #1a202c; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: linear-gradient(135deg, #f5f7fa, #c3cfe2); min-height: 100vh; }
        .header { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 15px 20px; }
        .header a { color: white; text-decoration: none; }
        .container { max-width: 400px; margin: 50px auto; padding: 20px; }
        .card { background: white; border-radius: 16px; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { text-align: center; margin-bottom: 30px; color: var(--dark); }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { width: 100%; padding: 12px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        .link { text-align: center; margin-top: 15px; }
        .link a { color: var(--primary); text-decoration: none; }
        .error { color: red; text-align: center; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="header"><a href="index.html">← 返回首页</a></div>
    <div class="container">
        <div class="card">
            <h1>登录</h1>
            <div class="error" id="error"></div>
            <input type="text" id="username" placeholder="用户名">
            <input type="password" id="password" placeholder="密码">
            <button onclick="doLogin()">登录</button>
            <div class="link">没有账号？<a href="register.html">立即注册</a></div>
        </div>
    </div>
    <script>
        if (localStorage.getItem('user')) window.location.href = 'index.html';
        
        function doLogin() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value;
            const e = document.getElementById('error');
            if (!u || !p) { e.textContent = '请输入用户名和密码'; return; }
            
            // 临时用户列表
            const users = JSON.parse(localStorage.getItem('all_users') || '[]');
            const user = users.find(x => x.username === u && x.password === p);
            
            if (user) {
                localStorage.setItem('token', btoa(JSON.stringify({username:user.username})));
                localStorage.setItem('user', JSON.stringify(user));
                window.location.href = 'index.html';
            } else {
                e.textContent = '用户名或密码错误';
            }
        }
    </script>
</body>
</html>
