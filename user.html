<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 小一二官网</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #667eea; --secondary: #764ba2; --dark: #1a202c; --light: #f7fafc; --text: #4a5568; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; color: var(--text); }
        .header { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: white; padding: 15px 20px; }
        .header a { color: white; text-decoration: none; }
        .container { max-width: 500px; margin: 40px auto; padding: 20px; }
        .card { background: white; border-radius: 16px; padding: 30px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .card h2 { color: var(--dark); font-size: 1.3rem; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid var(--light); }
        .user-header { text-align: center; margin-bottom: 30px; }
        .user-header img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 4px solid var(--light); margin-bottom: 15px; cursor: pointer; }
        .user-header h2 { margin-bottom: 5px; border: none; padding: 0; }
        .user-header p { color: #666; font-size: 0.9rem; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--dark); font-weight: 500; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { width: 100%; padding: 12px; background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        button.danger { background: #e53e3e; margin-top: 10px; }
        .msg { text-align: center; padding: 10px; border-radius: 8px; margin-bottom: 15px; }
        .msg.success { background: #c6f6d5; color: #22543d; }
        .msg.error { background: #fed7d7; color: #742a2a; }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html">← 返回首页</a>
    </div>
    <div class="container" id="app">
        加载中...
    </div>

    <script>
        const token = localStorage.getItem('token');
        const userStr = localStorage.getItem('user');
        
        if (!token || !userStr) {
            document.getElementById('app').innerHTML = '<div class="card"><p>未登录，请先 <a href="login.html">登录</a></p></div>';
        } else {
            const user = JSON.parse(userStr);
            const avatar = user.avatar || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + user.username;
            
            document.getElementById('app').innerHTML = `
                <div class="card">
                    <div class="user-header">
                        <img src="${avatar}" alt="头像">
                        <h2>${user.username}</h2>
                        <p>注册时间：${new Date(user.created_at).toLocaleDateString()}</p>
                    </div>
                </div>
                
                <div class="card">
                    <h2>修改头像</h2>
                    <div class="msg" id="avatarMsg" style="display:none;"></div>
                    <div class="form-group">
                        <label>头像图片地址</label>
                        <input type="text" id="avatarUrl" placeholder="输入图片URL" value="${user.avatar || ''}">
                    </div>
                    <button onclick="saveAvatar()">保存头像</button>
                </div>
                
                <div class="card">
                    <h2>修改密码</h2>
                    <div class="msg" id="passwordMsg" style="display:none;"></div>
                    <div class="form-group">
                        <label>当前密码</label>
                        <input type="password" id="oldPassword" placeholder="请输入当前密码">
                    </div>
                    <div class="form-group">
                        <label>新密码</label>
                        <input type="password" id="newPassword" placeholder="请输入新密码">
                    </div>
                    <button onclick="changePassword()">修改密码</button>
                </div>
                
                <div class="card">
                    <button class="danger" onclick="logout()">退出登录</button>
                </div>
            `;
        }
        
        function saveAvatar() {
            const avatar = document.getElementById('avatarUrl').value.trim();
            const msgEl = document.getElementById('avatarMsg');
            
            user.avatar = avatar;
            localStorage.setItem('user', JSON.stringify(user));
            
            msgEl.className = 'msg success';
            msgEl.textContent = '头像修改成功！';
            msgEl.style.display = 'block';
            
            // 刷新页面显示新头像
            setTimeout(() => location.reload(), 1000);
        }
        
        function changePassword() {
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const msgEl = document.getElementById('passwordMsg');
            
            if (!oldPassword || !newPassword) {
                msgEl.className = 'msg error';
                msgEl.textContent = '请填写所有密码字段';
                msgEl.style.display = 'block';
                return;
            }
            
            // 获取所有用户数据
            let users = JSON.parse(localStorage.getItem('all_users') || '[]');
            const userIndex = users.findIndex(u => u.username === user.username);
            
            if (userIndex === -1 || users[userIndex].password !== oldPassword) {
                msgEl.className = 'msg error';
                msgEl.textContent = '当前密码错误';
                msgEl.style.display = 'block';
                return;
            }
            
            // 更新密码
            users[userIndex].password = newPassword;
            localStorage.setItem('all_users', JSON.stringify(users));
            
            alert('密码修改成功，请重新登录');
            logout();
        }
        
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
