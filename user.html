<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 小一二官网</title>
    <link rel="preconnect" href="https://picx.zhimg.com">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #667eea; --secondary: #764ba2; --dark: #1a202c; --light: #f7fafc; --text: #4a5568; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; color: var(--text); }
        .header { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: white; padding: 15px 20px; }
        .header a { color: white; text-decoration: none; }
        .container { max-width: 500px; margin: 40px auto; padding: 20px; }
        .card { background: white; border-radius: 16px; padding: 30px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .card h2 { color: var(--dark); font-size: 1.3rem; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid var(--light); }
        .user-header { text-align: center; margin-bottom: 30px; }
        .user-header img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 4px solid var(--light); margin-bottom: 15px; cursor: pointer; }
        .user-header h2 { margin-bottom: 5px; border: none; padding: 0; }
        .user-header p { color: #666; font-size: 0.9rem; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--dark); font-weight: 500; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        .form-group input:focus { outline: none; border-color: var(--primary); }
        button { width: 100%; padding: 12px; background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        button:hover { opacity: 0.9; }
        button.secondary { background: #718096; }
        button.danger { background: #e53e3e; margin-top: 10px; }
        .msg { text-align: center; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.9rem; }
        .msg.success { background: #c6f6d5; color: #22543d; }
        .msg.error { background: #fed7d7; color: #742a2a; }
        .avatar-preview { text-align: center; margin-bottom: 20px; }
        .avatar-preview img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 4px solid var(--light); }
        .avatar-url-input { display: none; }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html">← 返回首页</a>
    </div>
    <div class="container">
        <div class="card" id="userCard">
            <div class="user-header">
                <img id="avatarImg" src="" alt="头像" onclick="showAvatarEdit()">
                <h2 id="username"></h2>
                <p>注册时间：<span id="createdAt"></span></p>
            </div>
        </div>

        <div class="card" id="avatarCard" style="display:none;">
            <h2>修改头像</h2>
            <div class="msg" id="avatarMsg" style="display:none;"></div>
            <div class="avatar-preview">
                <img id="avatarPreview" src="" alt="头像预览">
            </div>
            <div class="form-group">
                <label>头像图片地址</label>
                <input type="text" id="avatarUrl" placeholder="输入图片URL地址">
            </div>
            <div style="display:flex;gap:10px;">
                <button onclick="saveAvatar()">保存头像</button>
                <button class="secondary" onclick="cancelAvatarEdit()">取消</button>
            </div>
        </div>

        <div class="card" id="passwordCard">
            <h2>修改密码</h2>
            <div class="msg" id="passwordMsg" style="display:none;"></div>
            <div class="form-group">
                <label>当前密码</label>
                <input type="password" id="oldPassword" placeholder="请输入当前密码">
            </div>
            <div class="form-group">
                <label>新密码</label>
                <input type="password" id="newPassword" placeholder="请输入新密码（至少6位）">
            </div>
            <div class="form-group">
                <label>确认新密码</label>
                <input type="password" id="confirmPassword" placeholder="请再次输入新密码">
            </div>
            <button onclick="changePassword()">修改密码</button>
        </div>

        <div class="card">
            <button class="danger" onclick="logout()">退出登录</button>
        </div>
    </div>

    <script>
        const API = 'https://xyy-website.y434786896.workers.dev';
        let currentUser = null;

        async function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }
            try {
                const res = await fetch(API + '/api/me', { headers: { 'Authorization': 'Bearer ' + token } });
                if (res.ok) {
                    currentUser = await res.json();
                    showUserInfo();
                } else {
                    localStorage.removeItem('token');
                    window.location.href = 'login.html';
                }
            } catch (e) {
                alert('网络错误');
                window.location.href = 'login.html';
            }
        }

        function showUserInfo() {
            const avatar = currentUser.avatar || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + currentUser.username;
            document.getElementById('avatarImg').src = avatar;
            document.getElementById('avatarPreview').src = avatar;
            document.getElementById('avatarUrl').value = currentUser.avatar || '';
            document.getElementById('username').textContent = currentUser.username;
            document.getElementById('createdAt').textContent = new Date(currentUser.created_at).toLocaleDateString();
        }

        function showAvatarEdit() {
            document.getElementById('userCard').style.display = 'none';
            document.getElementById('passwordCard').style.display = 'none';
            document.getElementById('avatarCard').style.display = 'block';
        }

        function cancelAvatarEdit() {
            document.getElementById('avatarCard').style.display = 'none';
            document.getElementById('passwordCard').style.display = 'block';
            document.getElementById('userCard').style.display = 'block';
        }

        async function saveAvatar() {
            const avatar = document.getElementById('avatarUrl').value.trim();
            const msgEl = document.getElementById('avatarMsg');
            
            const token = localStorage.getItem('token');
            try {
                const res = await fetch(API + '/api/user/avatar', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ avatar })
                });
                const data = await res.json();
                if (res.ok) {
                    currentUser.avatar = avatar;
                    localStorage.setItem('user', JSON.stringify(currentUser));
                    showUserInfo();
                    msgEl.className = 'msg success';
                    msgEl.textContent = '头像修改成功！';
                    msgEl.style.display = 'block';
                    setTimeout(() => {
                        cancelAvatarEdit();
                        msgEl.style.display = 'none';
                    }, 1500);
                } else {
                    msgEl.className = 'msg error';
                    msgEl.textContent = data.error || '修改失败';
                    msgEl.style.display = 'block';
                }
            } catch (e) {
                msgEl.className = 'msg error';
                msgEl.textContent = '网络错误';
                msgEl.style.display = 'block';
            }
        }

        async function changePassword() {
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const msgEl = document.getElementById('passwordMsg');

            if (!oldPassword || !newPassword || !confirmPassword) {
                msgEl.className = 'msg error';
                msgEl.textContent = '请填写所有密码字段';
                msgEl.style.display = 'block';
                return;
            }

            if (newPassword.length < 6) {
                msgEl.className = 'msg error';
                msgEl.textContent = '新密码至少需要6位';
                msgEl.style.display = 'block';
                return;
            }

            if (newPassword !== confirmPassword) {
                msgEl.className = 'msg error';
                msgEl.textContent = '两次输入的新密码不一致';
                msgEl.style.display = 'block';
                return;
            }

            const token = localStorage.getItem('token');
            try {
                const res = await fetch(API + '/api/user/password', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ oldPassword, newPassword })
                });
                const data = await res.json();
                if (res.ok) {
                    alert('密码修改成功，请重新登录');
                    logout();
                } else {
                    msgEl.className = 'msg error';
                    msgEl.textContent = data.error || '修改失败';
                    msgEl.style.display = 'block';
                }
            } catch (e) {
                msgEl.className = 'msg error';
                msgEl.textContent = '网络错误';
                msgEl.style.display = 'block';
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }

        // 头像预览
        document.getElementById('avatarUrl').addEventListener('input', function() {
            const url = this.value.trim();
            if (url) {
                document.getElementById('avatarPreview').src = url;
            }
        });

        checkAuth();
    </script>
</body>
</html>
